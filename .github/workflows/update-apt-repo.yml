name: Update APT Repository

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repository to build from'
        required: false
        default: 'danlil240/ROS-Hacks'
      source_ref:
        description: 'Branch/tag to build from'
        required: false
        default: 'main'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-apt-repo:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout APT repository
        uses: actions/checkout@v4
        with:
          path: apt-repo
          
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.source_repo || 'danlil240/ROS-Hacks' }}
          ref: ${{ github.event.inputs.source_ref || 'main' }}
          path: source
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper build-essential gnupg fakeroot
          
      - name: Import GPG key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          EXPECTED_FPR="$(tr -d '[:space:]' < apt-repo/SIGNING_KEY_FPR)"
          IMPORTED_FPR="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          if [ "$IMPORTED_FPR" != "$EXPECTED_FPR" ]; then
            echo "ERROR: Imported key ($IMPORTED_FPR) does not match SIGNING_KEY_FPR ($EXPECTED_FPR)" >&2
            exit 1
          fi
          gpg --list-secret-keys
          
      - name: Build package
        run: |
          cd source
          dpkg-buildpackage -us -uc -b -d
          
      - name: Update APT repository
        run: |
          cd apt-repo
          
          # Copy new package
          cp ../source/../*.deb pool/main/
          
          # Update packages index
          dpkg-scanpackages --multiversion pool/ > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages
          
          # Create empty i386 packages
          mkdir -p dists/stable/main/binary-i386
          touch dists/stable/main/binary-i386/Packages
          gzip -k -f dists/stable/main/binary-i386/Packages
          
          # Create Release file
          cat > dists/stable/Release <<EOF
          Origin: ROS-Hacks Repository
          Label: ROS-Hacks
          Suite: stable
          Codename: stable
          Architectures: amd64 i386
          Components: main
          Description: ROS-Hacks APT Repository
          Date: $(date -R -u)
          EOF
          
          # Add file hashes
          echo "SHA256:" >> dists/stable/Release
          for f in dists/stable/main/binary-*/Packages*; do
            echo -n " " >> dists/stable/Release
            echo -n $(sha256sum $f | cut -d" " -f1) >> dists/stable/Release
            echo -n " " >> dists/stable/Release  
            echo -n $(stat -c%s $f) >> dists/stable/Release
            echo " $(echo $f | sed 's|^dists/stable/||')" >> dists/stable/Release
          done
          
          echo "MD5Sum:" >> dists/stable/Release
          for f in dists/stable/main/binary-*/Packages*; do
            echo -n " " >> dists/stable/Release
            echo -n $(md5sum $f | cut -d" " -f1) >> dists/stable/Release
            echo -n " " >> dists/stable/Release
            echo -n $(stat -c%s $f) >> dists/stable/Release  
            echo " $(echo $f | sed 's|^dists/stable/||')" >> dists/stable/Release
          done
          
      - name: Sign Release
        env:
          APT_GPG_KEY_FPR: ${{ secrets.APT_GPG_KEY_NAME }}
        run: |
          cd apt-repo
          EXPECTED_FPR="$(tr -d '[:space:]' < SIGNING_KEY_FPR)"
          SIGNING_KEY="$EXPECTED_FPR"
          if [ -n "$APT_GPG_KEY_FPR" ] && [ "$APT_GPG_KEY_FPR" != "$EXPECTED_FPR" ]; then
            echo "ERROR: APT_GPG_KEY_NAME secret ($APT_GPG_KEY_FPR) does not match SIGNING_KEY_FPR ($EXPECTED_FPR)" >&2
            exit 1
          fi
          rm -f dists/stable/Release.gpg dists/stable/InRelease
          gpg --batch --yes --default-key "$SIGNING_KEY" -abs -o dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --default-key "$SIGNING_KEY" --clearsign -o dists/stable/InRelease dists/stable/Release
          gpg --armor --export "$SIGNING_KEY" > ros-hacks.key
          EXPORTED_FPR="$(gpg --with-colons --import-options show-only --import < ros-hacks.key | awk -F: '/^fpr:/ {print $10; exit}')"
          if [ "$EXPORTED_FPR" != "$EXPECTED_FPR" ]; then
            echo "ERROR: ros-hacks.key fingerprint ($EXPORTED_FPR) does not match canonical key ($EXPECTED_FPR)" >&2
            exit 1
          fi
          
      - name: Commit and push changes
        run: |
          cd apt-repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          
          if ! git diff --staged --quiet; then
            git commit -m "Update APT repository - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit"
          fi
